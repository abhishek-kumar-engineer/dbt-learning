version: 2

models:
    - name: bronze_date
      config : 
        materialized: view
    
    - name: bronze_orders
      config :
        materialized: view
    
    - name: bronze_sales
      config :
        materialized: view
      columns:
        - name: sales_id
          description: "The unique identifier for each sale."
          data_tests:
            - not_null
            - unique
        - name: gross_amount
          data_tests:
            - generic_non_negative_value:
                arguments:
                  column_name: gross_amount

    - name: bronze_store
      config :
        materialized: view
      columns:
        - name: country
          description: "The unique identifier for each store."
          data_tests:
            - accepted_values:
                arguments:
                  values: ["USA", "Canada", "Mexico"]
                config:
                  severity: warn

